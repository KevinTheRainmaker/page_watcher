<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Watcher 모바일 알림 등록</title>
    <style>
      body {
        margin: 0;
        color: #172033;
        background: #f7f8fb;
        font: 16px/1.5 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        display: grid;
        gap: 14px;
        max-width: 520px;
        margin: 0 auto;
        padding: 28px 18px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
      }
      button {
        min-height: 44px;
        border: 0;
        border-radius: 8px;
        color: #fff;
        background: #2457c5;
        font: inherit;
        font-weight: 700;
      }
      #status {
        min-height: 48px;
        padding: 12px;
        border-radius: 8px;
        background: #e9edf5;
      }
      code {
        overflow-wrap: anywhere;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Page Watcher 모바일 알림 등록</h1>
      <p>이 페이지에서 브라우저 알림을 허용하면, 데스크톱 Page Watcher가 감지한 변경 알림을 이 기기에서 받을 수 있습니다.</p>
      <p>등록 채널: <code id="channel"></code></p>
      <button id="register" type="button">이 기기에 알림 등록</button>
      <div id="status" role="status" aria-live="polite"></div>
    </main>
    <script>
      const params = new URLSearchParams(location.search);
      const channel = params.get("channel") || "";
      const statusEl = document.getElementById("status");
      document.getElementById("channel").textContent = channel || "(채널 없음)";

      document.getElementById("register").addEventListener("click", async () => {
        try {
          if (!/^[-_A-Za-z0-9]{8,80}$/.test(channel)) {
            setStatus("등록 채널이 올바르지 않습니다.");
            return;
          }
          if (!("serviceWorker" in navigator) || !("PushManager" in window)) {
            setStatus("이 브라우저는 Web Push를 지원하지 않습니다.");
            return;
          }
          const permission = await Notification.requestPermission();
          if (permission !== "granted") {
            setStatus("알림 권한이 허용되지 않았습니다.");
            return;
          }
          const registration = await navigator.serviceWorker.register("/sw.js");
          const { publicKey } = await fetch("/vapid-public-key").then((response) => response.json());
          const subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey)
          });
          const response = await fetch("/subscribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ channel, subscription })
          });
          if (!response.ok) {
            setStatus("등록에 실패했습니다.");
            return;
          }
          setStatus("등록되었습니다. 이제 이 기기에서 Page Watcher 알림을 받을 수 있습니다.");
        } catch (error) {
          setStatus("등록 중 오류가 발생했습니다.");
        }
      });

      function setStatus(message) {
        statusEl.textContent = message;
      }

      function urlBase64ToUint8Array(base64String) {
        const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
        const rawData = atob(base64);
        return Uint8Array.from([...rawData].map((char) => char.charCodeAt(0)));
      }
    </script>
  </body>
</html>
