<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ZEUS Grade Watcher</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <strong>ZEUS Grade Watcher</strong>
        <span data-role="state">대기</span>
      </header>
      <section>
        <button data-action="register">개인성적조회 화면 등록</button>
        <button class="secondary" data-action="record-refresh-action">새로고침 액션 등록</button>
        <button data-action="check">지금 확인</button>
      </section>
      <section>
        <button class="secondary" data-action="show-qr">핸드폰 등록 QR 표시</button>
        <button class="secondary" data-action="test-push">푸시 테스트</button>
        <div class="qr" data-role="qr" hidden></div>
      </section>
      <section class="interval">
        <label for="interval">검사 주기</label>
        <select id="interval" data-field="interval">
          <option value="5">5분</option>
          <option value="10">10분</option>
          <option value="30" selected>30분</option>
          <option value="60">1시간</option>
        </select>
        <button data-action="save-interval">자동 감시 시작</button>
      </section>
      <section>
        <button class="secondary" data-action="clear">설정 삭제</button>
      </section>
      <p data-role="summary">두 번째 화면처럼 개인성적조회 표가 보이는 상태에서 등록하세요.</p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
